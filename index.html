<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello World Exercise</title>
    <style>
        body {
            font-family: "Times New Roman", Times, serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px;
            gap: 20px;
        }

        .box {
            width: 400px;
            padding: 10px;
            font-size: 24px;
            font-weight: bold;
        }

        /* Top Box: Double Border */
        .top-box {
            background-color: lightblue;
            border: 6px double tomato;
        }

        /* Middle Box: Rounded Solid Border */
        .middle-box {
            background-color: yellow;
            border: 3px solid blue;
            border-radius: 20px;
        }

        /* Bottom Box: Dotted Border */
        .bottom-box {
            background-color: #57a673; /* A medium sea green */
            border: 8px dotted grey;
            color: black;
        }
    </style>
</head>
<body>

    <div class="box top-box">Hello World</div>
    <div class="box middle-box">Hello World</div>
    <div class="box bottom-box">Hello World</div>

</body>
</html>
