<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello World 練習</title>
    <style>
        body {
            font-family: "Times New Roman", Times, serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px;
            gap: 25px; /* 控制三個框框之間的距離 */
        }

        .box {
            width: 450px;
            padding: 15px;
            font-size: 28px;
            font-weight: bold;
        }

        /* 第一個：雙線邊框 (Double Border) */
        .top-box {
            background-color: #add8e6; /* 淺藍背景 */
            border: 6px double #ff6347; /* 番茄紅雙線 */
        }

        /* 第二個：淺藍實線邊框 + 圓角 */
        .middle-box {
            background-color: #ffff00; /* 黃色背景 */
            border: 4px solid #00bfff; /* 淺藍色實線 */
            border-radius: 20px;       /* 圓角效果 */
        }

        /* 第三個：灰色圓點邊框 */
        .bottom-box {
            background-color: #57a673; /* 綠色背景 */
            border: 10px dotted #808080; /* 灰色點點 (Dotted 在現代瀏覽器會顯示為圓點) */
            color: #000;
        }
    </style>
</head>
<body>

    <div class="box top-box">Hello World</div>
    <div class="box middle-box">Hello World</div>
    <div class="box bottom-box">Hello World</div>

</body>
</html>
