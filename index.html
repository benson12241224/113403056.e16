<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <style>
        body {
            font-family: serif;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: flex-start;
        }

        .box {
            width: 500px;
            font-size: 32px;
            font-weight: bold;
            padding: 10px 20px;
        }

        /* 第一個：淺藍背景，雙線紅色邊框 */
        .box-1 {
            background-color: #add8e6; /* 淺藍色 */
            border: 5px double #ff6347; /* 雙線，橘紅色 */
        }

        /* 第二個：黃色背景，藍色實線邊框，大圓角 */
        .box-2 {
            background-color: #ffff00; /* 黃色 */
            border: 3px solid #0000ff; /* 藍色實線 */
            border-radius: 25px;       /* 圓角效果 */
        }

        /* 第三個：綠色背景，灰色點狀邊框 */
        .box-3 {
            background-color: #3cb371; /* 中綠色 */
            border: 8px dotted #808080; /* 灰色點狀邊框 */
            color: #000;               /* 文字顏色 */
        }
    </style>
</head>
<body>

    <div class="box box-1">Hello World</div>
    <div class="box box-2">Hello World</div>
    <div class="box box-3">Hello World</div>

</body>
</html>
