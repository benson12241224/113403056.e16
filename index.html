            display: flex;
            flex-direction: column;

        .box {
            width: 500px;
            padding: 15px;
            font-size: 28px;
            font-weight: bold;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);

        /* 1. 雙線邊框 */
        .top-box {
            background-color: #add8e6;
            border: 6px double #ff6347;
        }

        /* 2. 淺藍實線圓角 */
        .middle-box {
            background-color: #ffff00;
            border: 4px solid #00bfff;
            border-radius: 20px;
        }
